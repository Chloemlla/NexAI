name: Release NexAI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle*', 'android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Flutter pub dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Subset JetBrains Mono font
        run: python scripts/subset_jetbrains_mono.py

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Generate app icons
        run: |
          sudo apt-get install -y imagemagick
          convert -size 1024x1024 xc:"#FFFFFF" \
            -fill white -draw "roundrectangle 200,180 824,870 80,80" \
            -fill "#FFFFFF" -draw "circle 400,450 400,510" \
            -fill "#FFFFFF" -draw "circle 624,450 624,510" \
            -fill "#FFFFFF" -draw "roundrectangle 380,600 644,700 40,40" \
            assets/icon.png
          convert -size 1024x1024 xc:none \
            -fill white -draw "roundrectangle 280,260 744,790 70,70" \
            -fill "#FFFFFF" -draw "circle 420,470 420,520" \
            -fill "#FFFFFF" -draw "circle 604,470 604,520" \
            -fill "#FFFFFF" -draw "roundrectangle 400,610 624,690 30,30" \
            assets/icon_foreground.png
          dart run flutter_launcher_icons


      - name: Resolve lumen-crash SDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/resolve-lumen-crash.sh
          bash scripts/resolve-lumen-crash.sh
          echo "lumenCrashVersion=$(grep '^lumenCrashVersion=' android/gradle.properties | cut -d= -f2-)"

      - name: Write signing config
        run: |
          missing=()
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            missing+=("KEYSTORE_BASE64")
          fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            missing+=("KEYSTORE_PASSWORD")
          fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            missing+=("KEY_ALIAS")
          fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            missing+=("KEY_PASSWORD")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing Android release signing secrets: ${missing[*]}"
            exit 1
          fi

          echo "✓ Decoding keystore from secret..."
          if ! echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/nexai.jks; then
            echo "::error::Failed to decode KEYSTORE_BASE64"
            exit 1
          fi
          if [ ! -s "${{ github.workspace }}/nexai.jks" ]; then
            echo "::error::Keystore file not created"
            exit 1
          fi

          echo "NEXAI_STORE_FILE=${{ github.workspace }}/nexai.jks" >> android/gradle.properties
          echo "NEXAI_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "NEXAI_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "NEXAI_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties
          echo "✓ Release signing configured"

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Run build.ps1 (version control)
        run: pwsh scripts/build.ps1 -Arg android

      - name: Build Android APK
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate \
            --tree-shake-icons \
            --split-debug-info=debug_symbols/android \
            --dart-define-from-file=nexai_release.json \
            --build-number=${{ env.VERSION_CODE }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-debug-symbols
          path: debug_symbols/
          retention-days: 90

      - name: Rename APK outputs for release
        run: |
          VERSION="${{ env.VERSION_NAME }}-${{ env.SHORT_HASH }}"
          for file in build/app/outputs/flutter-apk/app-*-release.apk; do
            if [ -f "$file" ]; then
              abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
              cp "$file" "build/app/outputs/flutter-apk/NexAI_android_${VERSION}_${abi}.apk"
            fi
          done

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: NexAI-Android-APK
          path: build/app/outputs/flutter-apk/NexAI_android_*.apk
          retention-days: 7

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-outputs
          path: build/app/outputs/
          retention-days: 7

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'
          cache: true

      - name: Cache Flutter pub dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Subset JetBrains Mono font
        run: python scripts/subset_jetbrains_mono.py

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Run build.ps1 (version control)
        run: pwsh scripts/build.ps1

      - name: Build Web
        run: flutter build web --release --web-renderer canvaskit --dart-define-from-file=nexai_release.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: NexAI-Web
          path: build/web/
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Compute version metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $commitHash = (git rev-parse HEAD).Trim()
          $shortHash = $commitHash.Substring(0, 9)
          $versionName = '1.0.7'
          if (Test-Path 'pubspec.yaml') {
            $line = Select-String -Path 'pubspec.yaml' -Pattern '^\s*version:\s*([\d\.]+)' | Select-Object -First 1
            if ($line -and $line.Matches.Count -gt 0) {
              $versionName = $line.Matches[0].Groups[1].Value
            }
          }
          $displayName = "$versionName-$shortHash"
          "VERSION_NAME=$versionName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SHORT_HASH=$shortHash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_DISPLAY=$displayName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore WinUI solution
        shell: pwsh
        run: |
          msbuild winui\NexAI.WinUI3.sln /t:Restore /p:Configuration=Release /p:Platform=x64 /v:m

      - name: Precheck WinUI resource keys
        shell: pwsh
        run: |
          # Fail fast with ALL PRI resource/scope collisions in one pass.
          # MSBuild PRI generation typically only surfaces the first collision.
          pwsh -File scripts/check-winui-resw.ps1 -CheckCodeReferences

      - name: Build WinUI3 client
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $log = 'artifacts/winui-build.log'
          $cmd = @(
            'winui\NexAI.WinUI3\NexAI.WinUI3.csproj',
            '/p:Configuration=Release',
            '/p:Platform=x64',
            '/p:WindowsPackageType=None',
            '/p:WindowsAppSDKSelfContained=true',
            '/p:Restore=false',
            '/v:n',
            '/fl',
            '/flp:LogFile=' + $log + ';Verbosity=normal'
          )
          Write-Host "msbuild $($cmd -join ' ')"
          & msbuild @cmd
          if ($LASTEXITCODE -ne 0) {
            Write-Host '--- WinUI build failed. Emitting error/warning summary from log ---'
            if (Test-Path $log) {
              Select-String -Path $log -Pattern 'error |warning ' | ForEach-Object { $_.Line }
            }
            exit $LASTEXITCODE
          }

      - name: Upload WinUI build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: winui-build-log
          path: artifacts/winui-build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Compress Windows Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $candidates = @(
            'winui/NexAI.WinUI3/bin/x64/Release/net9.0-windows10.0.19041.0',
            'winui/NexAI.WinUI3/bin/Release/net9.0-windows10.0.19041.0',
            'winui/NexAI.WinUI3/bin/x64/Release/net9.0-windows10.0.19041.0/win-x64',
            'winui/NexAI.WinUI3/bin/Release/net9.0-windows10.0.19041.0/win-x64'
          )
          $source = $null
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              $exe = Get-ChildItem -Path $candidate -Filter NexAI.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($exe) {
                $source = $exe.Directory.FullName
                break
              }
            }
          }
          if (-not $source) {
            $exe = Get-ChildItem -Path 'winui/NexAI.WinUI3/bin' -Filter NexAI.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) { $source = $exe.Directory.FullName }
          }
          if (-not $source) {
            throw 'WinUI build output not found.'
          }
          if (Test-Path 'NexAI-Windows.zip') { Remove-Item -Force 'NexAI-Windows.zip' }
          Compress-Archive -Path (Join-Path $source '*') -DestinationPath 'NexAI-Windows.zip' -Force

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: NexAI-Windows
          path: NexAI-Windows.zip
          retention-days: 7

  release:
    needs: [build-android, build-web, build-windows]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: NexAI-Android-APK
          path: android-apk

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: NexAI-Web
          path: web-build

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: NexAI-Windows
          path: windows-build

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: android-outputs
          path: android-outputs

      - name: Package release assets
        run: |
          # Find all APK files with architecture suffix
          mkdir -p release-assets
          for apk in android-apk/NexAI_android_*.apk; do
            if [ -f "$apk" ]; then
              cp "$apk" release-assets/
            fi
          done
          
          # Package web build
          cd web-build && zip -r ../release-assets/NexAI-Web-${{ github.ref_name }}.zip . && cd ..
          
          # Package native WinUI3 windows build
          cp windows-build/NexAI-Windows.zip release-assets/NexAI-Windows-${{ github.ref_name }}.zip
          
          # Package all android outputs for debugging
          zip -r release-assets/android-outputs-${{ github.ref_name }}.zip android-outputs

          sha256sum release-assets/NexAI_android_*.apk > release-assets/APK_SHA256SUMS.txt
          python - <<'PY'
          import hashlib, json, pathlib, os
          assets = []
          for path in sorted(pathlib.Path("release-assets").iterdir()):
              if not path.is_file():
                  continue
              data = path.read_bytes()
              assets.append({
                  "name": path.name,
                  "sha256": hashlib.sha256(data).hexdigest(),
                  "size": len(data),
              })
          pathlib.Path("release-assets/release-manifest.json").write_text(json.dumps({
              "schemaVersion": 1,
              "tag": "${{ github.ref_name }}",
              "generatedAt": "${{ github.run_id }}",
              "assets": assets,
          }, indent=2), encoding="utf-8")
          PY

      - name: Generate release notes
        run: |
          echo "## NexAI ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Downloads" >> RELEASE_NOTES.md
          echo "- **Android APK** (multiple architectures available)" >> RELEASE_NOTES.md
          echo "- **Web**: \`NexAI-Web-${{ github.ref_name }}.zip\`" >> RELEASE_NOTES.md
          echo "- **Windows**: \`NexAI-Windows-${{ github.ref_name }}.zip\`" >> RELEASE_NOTES.md
          echo "- **Manifest**: \`release-manifest.json\`" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### APK SHA256" >> RELEASE_NOTES.md
          while read -r hash file; do
            name=$(basename "$file")
            echo "- \`$name\`" >> RELEASE_NOTES.md
            echo "  - sha256:$hash" >> RELEASE_NOTES.md
          done < release-assets/APK_SHA256SUMS.txt
          echo "" >> RELEASE_NOTES.md
          echo "### APK Architecture Guide" >> RELEASE_NOTES.md
          echo "- \`arm64-v8a\`: Modern 64-bit ARM devices (recommended for most users)" >> RELEASE_NOTES.md
          echo "- \`armeabi-v7a\`: Older 32-bit ARM devices" >> RELEASE_NOTES.md
          echo "- \`x86_64\`: 64-bit x86 devices (emulators, some tablets)" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Features" >> RELEASE_NOTES.md
          echo "- Auto-update detection via GitHub Releases" >> RELEASE_NOTES.md
          echo "- Custom OpenAI-compatible API (base URL, key, models)" >> RELEASE_NOTES.md
          echo "- LaTeX math & chemical formula rendering" >> RELEASE_NOTES.md
          echo "- Material You dynamic color on Android" >> RELEASE_NOTES.md
          echo "- Dark/Light/System theme support" >> RELEASE_NOTES.md
          echo "- Notes with auto-save support" >> RELEASE_NOTES.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: NexAI ${{ github.ref_name }}
          body_path: ./RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: |
            release-assets/NexAI_android_*.apk
            release-assets/APK_SHA256SUMS.txt
            release-assets/release-manifest.json
            release-assets/NexAI-Web-${{ github.ref_name }}.zip
            release-assets/NexAI-Windows-${{ github.ref_name }}.zip
            release-assets/android-outputs-${{ github.ref_name }}.zip



