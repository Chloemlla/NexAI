plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "org.jetbrains.kotlin.plugin.compose"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def versionCodeTimeZone = TimeZone.getTimeZone('UTC')
def fallbackVersionCode = Integer.parseInt(new Date().format('yyDDDHHmm', versionCodeTimeZone))
def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = "${fallbackVersionCode}"
} else {
    try {
        flutterVersionCode = "${Math.max(flutterVersionCode.toInteger(), fallbackVersionCode)}"
    } catch (Exception ignored) {
        flutterVersionCode = "${fallbackVersionCode}"
    }
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.7'
}

// Read version metadata from nexai_release.json (generated by build.ps1)
def nexaiName = flutterVersionName
def nexaiCode = flutterVersionCode
def nexaiShort = 'unknown'

def nexaiFile = rootProject.file('../nexai_release.json')
if (nexaiFile.exists()) {
    def nexaiJson = new groovy.json.JsonSlurper().parseText(nexaiFile.text)
    nexaiName = nexaiJson['nexai.name'] ?: nexaiName
    nexaiCode = "${nexaiJson['nexai.code'] ?: nexaiCode}"
    nexaiShort = nexaiJson['nexai.short'] ?: nexaiShort
    flutterVersionCode = nexaiCode
    flutterVersionName = nexaiName
} else {
    // Fallback: use a time-based versionCode so newer local releases stay upgradeable.
    try {
        def stdout = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'rev-parse', '--short', 'HEAD'
            standardOutput = stdout
        }
        nexaiShort = stdout.toString().trim()
        flutterVersionName = "${flutterVersionName}-${nexaiShort}"
    } catch (Exception e) {
        logger.warn("Failed to get git SHA, using 'unknown'")
        flutterVersionName = "${flutterVersionName}-${nexaiShort}"
    }
}

android {
    namespace "com.chloemlla.nexai"
    compileSdk 37
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.chloemlla.nexai"
        // lumen-crash requires minSdk 26.
        minSdk 26
        targetSdk 37
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        // Host metadata used by LumenCrashConfig.
        buildConfigField "String", "SHORT_HASH", "\"${nexaiShort}\""
        buildConfigField "String", "APP_DISPLAY_NAME", "\"NexAI\""
    }

    // Signing config for release builds (CI injects via gradle.properties)
    def nexaiStoreFile = project.findProperty('NEXAI_STORE_FILE')
    def nexaiStorePassword = project.findProperty('NEXAI_STORE_PASSWORD')
    def nexaiKeyAlias = project.findProperty('NEXAI_KEY_ALIAS')
    def nexaiKeyPassword = project.findProperty('NEXAI_KEY_PASSWORD')
    def hasReleaseSigning = nexaiStoreFile != null &&
        nexaiStorePassword != null &&
        nexaiKeyAlias != null &&
        nexaiKeyPassword != null &&
        file(nexaiStoreFile).exists()
    def useDebugSigning = project.hasProperty('NEXAI_USE_DEBUG_SIGNING') && project.property('NEXAI_USE_DEBUG_SIGNING') == 'true'
    
    if (hasReleaseSigning) {
        signingConfigs {
            release {
                storeFile file(nexaiStoreFile)
                storePassword nexaiStorePassword
                keyAlias nexaiKeyAlias
                keyPassword nexaiKeyPassword
            }
        }
        logger.lifecycle("✓ Using RELEASE signing configuration")
    } else if (useDebugSigning) {
        logger.warn("⚠ Using DEBUG signing - APK cannot be upgraded from release builds!")
    } else {
        logger.error("✗ No signing configuration found!")
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            } else if (useDebugSigning) {
                signingConfig signingConfigs.debug
                // Add debug suffix to version name to distinguish from release builds
                versionNameSuffix "-debug"
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            ndk {
                debugSymbolLevel 'SYMBOL_TABLE'
            }
        }
        debug {
            signingConfig signingConfigs.debug
            versionNameSuffix "-debug"
        }
    }

    gradle.taskGraph.whenReady { graph ->
        def hasReleaseTask = graph.allTasks.any { task ->
            task.name.toLowerCase().contains('release')
        }
        if (hasReleaseTask && !hasReleaseSigning && !useDebugSigning) {
            throw new GradleException("Release signing config is required. Set NEXAI_STORE_FILE, NEXAI_STORE_PASSWORD, NEXAI_KEY_ALIAS, and NEXAI_KEY_PASSWORD.")
        }
    }

    // 16KB page size alignment for Android 15+ / Google Play requirement
    packaging {
        jniLibs {
            useLegacyPackaging false
            excludes += [
                "**/libmpv.so",
                "**/libmedia_kit_video.so",
                "**/libmedia_kit_native_event_loop.so",
                "**/libmedia_kit_native_video.so",
                "**/libshaderc_shared.so"
            ]
        }
    }

    buildFeatures {
        // LumenCrashConfig needs BuildConfig fields for host app metadata.
        buildConfig true
        // Crash pending-report gate uses Compose (LumenCrashReportScreen).
        compose true
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.core:core-ktx:1.19.0"
    implementation "androidx.appcompat:appcompat:1.7.1"
    // Passkey Signal APIs still ship on the credentials 1.7 alpha line.
    implementation "androidx.credentials:credentials:1.7.0-alpha02"
    implementation "androidx.credentials:credentials-play-services-auth:1.7.0-alpha02"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.11.0"
    implementation "com.tencent:mmkv:2.4.0"

    // Auto-resolved latest Project Lumen main release (see CI/local resolver).
    // Do not hard-pin com.chloemlla.lumen:lumen-crash:X.Y.Z in source control.
    def lumenCrashVersion = findProperty("lumenCrashVersion") ?: System.getenv("LUMEN_CRASH_VERSION")
    if (!lumenCrashVersion) {
        throw new GradleException(
            "Resolve latest lumen-crash first. Set lumenCrashVersion in gradle.properties " +
            "or LUMEN_CRASH_VERSION env (see lumen-crash README section 2.1)."
        )
    }
    // Published lumen-crash POMs currently ship Compose API deps with empty
    // versions (BOM-managed in the library, not rewritten into Maven metadata).
    // Exclude those broken transitive coords and redeclare them via host BOM.
    implementation("com.chloemlla.lumen:lumen-crash:$lumenCrashVersion") {
        exclude group: "androidx.compose.ui"
        exclude group: "androidx.compose.material"
        exclude group: "androidx.compose.material3"
        exclude group: "androidx.compose.foundation"
        exclude group: "androidx.compose.animation"
    }

    // Compose host gate for LumenCrashReportScreen + SDK API surface.
    def composeBom = platform("androidx.compose:compose-bom:2024.12.01")
    implementation composeBom
    implementation "androidx.activity:activity-compose:1.13.0"
    implementation "androidx.compose.ui:ui"
    implementation "androidx.compose.material3:material3"
    implementation "androidx.compose.material:material-icons-extended"
    implementation "androidx.compose.material3:material3-window-size-class"
    implementation "androidx.compose.foundation:foundation"
    implementation "androidx.compose.animation:animation"

    // Align transitive AndroidX artifacts with compileSdk 37 / AGP 9.2.1
    constraints {
        implementation("androidx.core:core:1.19.0") {
            because "align with core-ktx for compileSdk 37"
        }
        implementation("androidx.core:core-ktx:1.19.0") {
            because "align with core-ktx for compileSdk 37"
        }
        implementation("androidx.browser:browser:1.10.0") {
            because "latest stable browser for AGP 9.2.1 / compileSdk 37"
        }
    }
}
