plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def versionCodeTimeZone = TimeZone.getTimeZone('UTC')
def fallbackVersionCode = Integer.parseInt(new Date().format('yyDDDHHmm', versionCodeTimeZone))
def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = "${fallbackVersionCode}"
} else {
    try {
        flutterVersionCode = "${Math.max(flutterVersionCode.toInteger(), fallbackVersionCode)}"
    } catch (Exception ignored) {
        flutterVersionCode = "${fallbackVersionCode}"
    }
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.7'
}

// Read version metadata from nexai_release.json (generated by build.ps1)
def nexaiName = flutterVersionName
def nexaiCode = flutterVersionCode
def nexaiShort = 'unknown'

def nexaiFile = rootProject.file('../nexai_release.json')
if (nexaiFile.exists()) {
    def nexaiJson = new groovy.json.JsonSlurper().parseText(nexaiFile.text)
    nexaiName = nexaiJson['nexai.name'] ?: nexaiName
    nexaiCode = "${nexaiJson['nexai.code'] ?: nexaiCode}"
    nexaiShort = nexaiJson['nexai.short'] ?: nexaiShort
    flutterVersionCode = nexaiCode
    flutterVersionName = nexaiName
} else {
    // Fallback: use a time-based versionCode so newer local releases stay upgradeable.
    try {
        def stdout = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'rev-parse', '--short', 'HEAD'
            standardOutput = stdout
        }
        nexaiShort = stdout.toString().trim()
        flutterVersionName = "${flutterVersionName}-${nexaiShort}"
    } catch (Exception e) {
        logger.warn("Failed to get git SHA, using 'unknown'")
        flutterVersionName = "${flutterVersionName}-${nexaiShort}"
    }
}

android {
    namespace "com.chloemlla.nexai"
    compileSdk 35
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.chloemlla.nexai"
        minSdk 24
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    // Signing config for release builds (CI injects via gradle.properties)
    def nexaiStoreFile = project.findProperty('NEXAI_STORE_FILE')
    def nexaiStorePassword = project.findProperty('NEXAI_STORE_PASSWORD')
    def nexaiKeyAlias = project.findProperty('NEXAI_KEY_ALIAS')
    def nexaiKeyPassword = project.findProperty('NEXAI_KEY_PASSWORD')
    def hasReleaseSigning = nexaiStoreFile != null &&
        nexaiStorePassword != null &&
        nexaiKeyAlias != null &&
        nexaiKeyPassword != null &&
        file(nexaiStoreFile).exists()
    def useDebugSigning = project.hasProperty('NEXAI_USE_DEBUG_SIGNING') && project.property('NEXAI_USE_DEBUG_SIGNING') == 'true'
    
    if (hasReleaseSigning) {
        signingConfigs {
            release {
                storeFile file(nexaiStoreFile)
                storePassword nexaiStorePassword
                keyAlias nexaiKeyAlias
                keyPassword nexaiKeyPassword
            }
        }
        logger.lifecycle("✓ Using RELEASE signing configuration")
    } else if (useDebugSigning) {
        logger.warn("⚠ Using DEBUG signing - APK cannot be upgraded from release builds!")
    } else {
        logger.error("✗ No signing configuration found!")
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            } else if (useDebugSigning) {
                signingConfig signingConfigs.debug
                // Add debug suffix to version name to distinguish from release builds
                versionNameSuffix "-debug"
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            ndk {
                debugSymbolLevel 'SYMBOL_TABLE'
            }
        }
        debug {
            signingConfig signingConfigs.debug
            versionNameSuffix "-debug"
        }
    }

    gradle.taskGraph.whenReady { graph ->
        def hasReleaseTask = graph.allTasks.any { task ->
            task.name.toLowerCase().contains('release')
        }
        if (hasReleaseTask && !hasReleaseSigning && !useDebugSigning) {
            throw new GradleException("Release signing config is required. Set NEXAI_STORE_FILE, NEXAI_STORE_PASSWORD, NEXAI_KEY_ALIAS, and NEXAI_KEY_PASSWORD.")
        }
    }

    // 16KB page size alignment for Android 15+ / Google Play requirement
    packaging {
        jniLibs {
            useLegacyPackaging false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.core:core-ktx:1.15.0"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "androidx.credentials:credentials:1.3.0"
    implementation "androidx.credentials:credentials-play-services-auth:1.3.0"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"

    // Force transitive dependencies to versions compatible with compileSdk 35 / AGP 8.7.3
    constraints {
        implementation("androidx.core:core:1.15.0") {
            because "1.17.0 requires compileSdk 36"
        }
        implementation("androidx.core:core-ktx:1.15.0") {
            because "1.17.0 requires compileSdk 36"
        }
        implementation("androidx.browser:browser:1.8.0") {
            because "1.9.0 requires compileSdk 36 and AGP 8.9.1+"
        }
    }
}
