pluginManagement {
    def kotlinPluginVersion = "2.4.0"

    resolutionStrategy {
        eachPlugin {
            if (requested.id.id.startsWith("org.jetbrains.kotlin.")) {
                useVersion(kotlinPluginVersion)
            }
        }
    }

    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "9.2.1" apply false
    id "org.jetbrains.kotlin.android" version "2.4.0" apply false
    id "org.jetbrains.kotlin.plugin.compose" version "2.4.0" apply false
}

// Lumen Crash can resolve from either:
// 1) GitHub Packages (gpr.user/gpr.key or GITHUB_ACTOR/GITHUB_TOKEN)
// 2) A CI-generated local Maven layout under android/local-maven
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
        // Prefer release assets staged by scripts/resolve-lumen-crash.* so CI does
        // not need cross-repo GitHub Packages auth for lumen-crash-core.
        maven {
            name = "LumenCrashLocal"
            url = uri("${settingsDir}/local-maven")
        }
        def gprUser = providers.gradleProperty("gpr.user").orNull
            ?: System.getenv("GITHUB_ACTOR")
        def gprKey = providers.gradleProperty("gpr.key").orNull
            ?: System.getenv("GITHUB_TOKEN")
        // Only register GitHub Packages when credentials exist. Empty credentials
        // return 401 and abort resolution even if local-maven already has the AAR.
        if (gprUser && gprKey) {
            maven {
                name = "GitHubPackagesProjectLumen"
                url = uri("https://maven.pkg.github.com/Chloemlla/Project-Lumen")
                credentials {
                    username = gprUser
                    password = gprKey
                }
            }
        }
    }
}

include ":app"
