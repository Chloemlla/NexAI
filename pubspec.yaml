name: nexai
description: NexAI - A beautiful OpenAI client with Material Design 3
publish_to: 'none'
version: 1.0.7-4a1684455

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  
  # Google Cloud
  gcloud: ^0.9.0

  # 网络
  dio: ^5.9.1
  cookie_jar: ^4.0.8
  connectivity_plus: ^7.0.0
  dio_http2_adapter: ^2.5.3
  # 图标
  font_awesome_flutter: ^10.12.0
  # material_design_icons_flutter: ^7.0.7296
  material_design_icons_flutter:
    git:
      url: https://github.com/bggRGjQaUbCoE/material_design_icons_flutter.git
      ref: const
  # toast
  flutter_smart_dialog: ^4.9.8+5
    # 加密
  crypto: ^3.0.6
  encrypt: ^5.0.3
  # 视频播放器
  media_kit: ^1.2.6 # Primary package.
  media_kit_video: ^1.3.1 # For video rendering.
  media_kit_libs_video: ^1.0.7
  ffmpeg_kit_flutter_new: ^4.1.0
  # 高帧率
  flutter_displaymode: ^0.7.0
  flutter:
    sdk: flutter
  http: ^1.6.0
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  flutter_math_fork: '>=0.7.4'
  gpt_markdown_chloemlla: ^2.0.1
  provider: ^6.1.5
  google_fonts: ^8.0.2
  url_launcher: ^6.3.2
  window_manager: ^0.5.1
  dynamic_color: '>=1.8.1'
  fluent_ui: ^4.14.0
  package_info_plus: ^8.3.0
  device_info_plus: ^11.5.0
  v_video_compressor: ^2.0.0
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  path: ^1.9.0
  gal: ^2.3.0
  permission_handler: ^11.4.0
  # 安全存储
  flutter_secure_storage: ^9.2.4
  # Passkey / WebAuthn
  passkeys: ^2.17.4
  # Google 登录
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    image_path: "assets/icon.png"
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/

  fonts:
    # vivo Sans 简体 - 主要字体（包含完整中文字符）
    - family: vivoSans
      fonts:
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-Thin.ttf
          weight: 100
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-ExtraLight.ttf
          weight: 200
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-Light.ttf
          weight: 300
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-Regular.ttf
          weight: 400
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-Medium.ttf
          weight: 500
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-DemiBold.ttf
          weight: 600
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-Bold.ttf
          weight: 700
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-ExtraBold.ttf
          weight: 800
        - asset: assets/vivo Sans/Brand/vivo Sans简体/vivoSans-Heavy.ttf
          weight: 900

    # vivo Sans Global - 备用字体（轻量级，适合英文）
    - family: vivoSansGlobal
      fonts:
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Thin.ttf
          weight: 100
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Extralight.ttf
          weight: 200
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Light.ttf
          weight: 300
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Regular.ttf
          weight: 400
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Medium.ttf
          weight: 500
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Demibold.ttf
          weight: 600
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Bold.ttf
          weight: 700
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Extrabold.ttf
          weight: 800
        - asset: assets/vivo Sans/Brand/vivo Sans Global/vivoSansGlobal-Heavy.ttf
          weight: 900

    # HarmonyOS Sans SC - 鸿蒙简体中文字体
    - family: HarmonyOS_Sans_SC
      fonts:
        - asset: assets/HarmonyOS Sans/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Thin.ttf
          weight: 100
        - asset: assets/HarmonyOS Sans/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Light.ttf
          weight: 300
        - asset: assets/HarmonyOS Sans/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Regular.ttf
          weight: 400
        - asset: assets/HarmonyOS Sans/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Medium.ttf
          weight: 500
        - asset: assets/HarmonyOS Sans/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Bold.ttf
          weight: 700
        - asset: assets/HarmonyOS Sans/HarmonyOS_Sans_SC/HarmonyOS_Sans_SC_Black.ttf
          weight: 900

    # OPPO Sans 4.0 - 可变字体（Variable Font）
    - family: OPPO_Sans
      fonts:
        - asset: assets/OPPO_Sans_4.0/OPPO Sans 4.0.ttf
